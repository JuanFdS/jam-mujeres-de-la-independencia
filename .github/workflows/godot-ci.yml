name: Godot CI/CD Pipeline

on: [push, pull_request]

env:
  GODOT_VERSION: "4.6.3"
  GODOT_STATUS: "stable"
jobs:
  export-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Godot
        run: |
          curl -sSL -o /tmp/godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot-bin
          chmod +x "/tmp/godot-bin/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64"
      - name: Disable Blender import (no Blender on CI, .blend files abort the whole import)
        run: |
          mkdir -p ~/.config/godot
          printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\nfilesystem/import/blender/enabled = false\n' > ~/.config/godot/editor_settings-${GODOT_VERSION%.*}.tres
      - name: Import assets
        run: |
          GODOT="/tmp/godot-bin/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64"
          "$GODOT" --headless --verbose --import --path godot || echo "first import pass exited with $? (retrying)"
          "$GODOT" --headless --verbose --import --path godot
      - name: Verify import
        run: |
          COUNT=$(find godot/.godot/imported -type f 2>/dev/null | wc -l)
          echo "Imported artifact files: $COUNT"
          if [ "$COUNT" -lt 50 ]; then
            echo "::error::Import did not run - only $COUNT files in godot/.godot/imported"
            exit 1
          fi
          if ! find godot/.godot/imported -name 'barrel.fbx-*' | grep -q .; then
            echo "::error::barrel.fbx was not imported"
            exit 1
          fi
      - name: install wine
        run: |
          sudo apt update
          sudo apt install wine64
          echo "WINE_PATH=$(which wine64)" >> $GITHUB_ENV
      - name: Export Game using Godot
        uses: firebelley/godot-export@v5.2.1
        with:
          godot_executable_download_url: "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}/Godot_v${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}_linux.x86_64.zip"
          godot_export_templates_download_url: "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}/Godot_v${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}_export_templates.tpz"
          relative_project_path: "./godot"
          archive_output: true
          cache: false
          wine_path: ${{ env.WINE_PATH }}
      - name: Upload HTML5
        uses: actions/upload-artifact@v4
        with:
          name: HTML5
          path: /home/runner/.local/share/godot/archives/HTML5.zip
      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: LinuxX11
          path: /home/runner/.local/share/godot/archives/LinuxX11.zip
      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: Windows
          path: /home/runner/.local/share/godot/archives/Windows.zip
      - name: Upload MacOS
        uses: actions/upload-artifact@v4
        with:
          name: macOS
          path: /home/runner/.local/share/godot/archives/macOS.zip
      - name: Prepare web build for GitHub Pages
        run: |
          mkdir -p build/web
          unzip -q /home/runner/.local/share/godot/archives/HTML5.zip -d build/web
      - name: Upload web (raw files, for GitHub Pages)
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: build/web

  deploy-to-itchio-linux:
    runs-on: ubuntu-latest
    needs: export-game
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: LinuxX11
      - name: Deploy to Itch.io (Windows)
        uses: manleydev/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: linux
          ITCH_GAME: ${{ secrets.ITCHIO_GAME }}
          ITCH_USER: ${{ secrets.ITCHIO_USERNAME }}
          PACKAGE: LinuxX11.zip

  deploy-to-itchio-windows:
    runs-on: ubuntu-latest
    needs: export-game
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: Windows
      - name: Deploy to Itch.io (Windows)
        uses: manleydev/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: windows
          ITCH_GAME: ${{ secrets.ITCHIO_GAME }}
          ITCH_USER: ${{ secrets.ITCHIO_USERNAME }}
          PACKAGE: Windows.zip

  deploy-to-itchio-mac:
    runs-on: ubuntu-latest
    needs: export-game
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: macOS
      - name: Deploy to Itch.io (MacOS)
        uses: manleydev/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: mac
          ITCH_GAME: ${{ secrets.ITCHIO_GAME }}
          ITCH_USER: ${{ secrets.ITCHIO_USERNAME }}
          PACKAGE: macOS.zip

  deploy-to-itchio-web:
    runs-on: ubuntu-latest
    needs: export-game
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: HTML5
      - name: Deploy to Itch.io (HTML5)
        uses: manleydev/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: web
          ITCH_GAME: ${{ secrets.ITCHIO_GAME }}
          ITCH_USER: ${{ secrets.ITCHIO_USERNAME }}
          PACKAGE: HTML5.zip
